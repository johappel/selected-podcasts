<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <meta
      name="description"
      content="Demo fuer eine statische Content-API aus kuratierten Podcast- und Feed-Quellen."
    />
    <title>Podcast Aggregator</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-copy">
          <h1>Podcast Aggregator</h1>
          <p class="hero-text">
            Diese Demo rendert die neuesten Eintraege aus <code>docs/api/latest.json</code>. Die eigentliche Ausgabe des
            Repositories ist die statische JSON-API unter <code>docs/api/</code>.
          </p>
        </div>
        <div class="hero-panel" aria-label="API-Uebersicht">
          <div class="metric">
            <span class="metric-label">Eintraege</span>
            <strong id="entry-count">0</strong>
          </div>
          <div class="metric">
            <span class="metric-label">API</span>
            <strong>Static JSON</strong>
          </div>
          <div class="metric">
            <span class="metric-label">Demo</span>
            <strong>Vanilla JS</strong>
          </div>
        </div>
      </header>

      <main class="content">
        <div id="status" class="status" role="status" aria-live="polite">Lade Eintraege ...</div>
        <section id="entry-list" class="podcast-grid" aria-label="Neueste Eintraege"></section>
      </main>
    </div>

    <template id="entry-card-template">
      <article class="podcast-card">
        <a class="podcast-image-link" target="_blank" rel="noreferrer noopener">
          <img class="podcast-image" alt="" loading="lazy" />
        </a>
        <div class="podcast-body">
          <div class="podcast-topline">
            <span class="podcast-source"></span>
            <time class="podcast-date"></time>
          </div>
          <h2 class="podcast-title"></h2>
          <p class="podcast-description"></p>
          <audio class="podcast-audio" controls preload="none"></audio>
          <a class="podcast-button" target="_blank" rel="noreferrer noopener">Eintrag oeffnen</a>
        </div>
      </article>
    </template>

    <script type="module" src="./app.js"></script>
  </body>
</html>
